<div id="sidebar">
  <div id="sidebarHeader">
    <span class="title">WhatsApp</span>
    <div class="headerIcons">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 9a2 2 0 0 1-2 2H6l-4 4V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2z"/>
        <path d="M18 9h2a2 2 0 0 1 2 2v11l-4-4h-6a2 2 0 0 1-2-2v-1"/>
      </svg>
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/>
      </svg>
    </div>
  </div>

  <div id="searchBox">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
    </svg>
    <input [(ngModel)]="searchText" type="text" placeholder="Search or start new chat" />
  </div>

  <div id="filterTabs">
    <span class="filter-tag" [class.active]="activeFilter === 'all'" (click)="setFilter('all')">All</span>
    <span class="filter-tag" [class.active]="activeFilter === 'unread'" (click)="setFilter('unread')">Unread</span>
    <span class="filter-tag" [class.active]="activeFilter === 'groups'" (click)="setFilter('groups')">Groups</span>
  </div>

  <div id="sidebarContent">
    <div class="conversation" [class.active]="conversation === selectedConversation" *ngFor="let conversation of filteredConversations" (click)="onConversationClick(conversation)">
      <div class="picture">
        <img [src]="conversation.name | avatarUrl" alt="Profile" />
      </div>
      <div class="content">
        <div class="conversationHeader">
          <div class="name">{{ conversation.name }}</div>
          <div class="time">{{ conversation.time }}</div>
        </div>
        <div class="message">
          <svg *ngIf="conversation.unreadCount === 0 && conversation.latestMessageRead" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00a884" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <svg *ngIf="conversation.unreadCount === 0 && !conversation.latestMessageRead" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8696a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          {{ conversation.latestMessage }}
        </div>
        <div class="unreadBadge" *ngIf="conversation.unreadCount > 0">
          {{ conversation.unreadCount > 99 ? '99+' : conversation.unreadCount }}
        </div>
      </div>
    </div>
  </div>
</div>
